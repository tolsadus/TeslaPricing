name: Scrape

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    inputs:
      scraper:
        description: Which scraper to run (leave empty to run all)
        required: false
        default: ''
        type: choice
        options:
          - ''
          - alcopa
          - capcar
          - gmecars
          - heycar
          - lbauto
          - renew

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run alcopa
        if: inputs.scraper == '' || inputs.scraper == 'alcopa'
        run: node scraper/cli.js alcopa
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run capcar
        if: inputs.scraper == '' || inputs.scraper == 'capcar'
        run: node scraper/cli.js capcar --pages 20
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run gmecars
        if: inputs.scraper == '' || inputs.scraper == 'gmecars'
        run: node scraper/cli.js gmecars --pages 2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run lbauto
        if: inputs.scraper == '' || inputs.scraper == 'lbauto'
        run: node scraper/cli.js lbauto --pages 10
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run heycar
        if: inputs.scraper == '' || inputs.scraper == 'heycar'
        run: node scraper/cli.js heycar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run renew
        if: inputs.scraper == '' || inputs.scraper == 'renew'
        run: node scraper/cli.js renew --pages 5
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
